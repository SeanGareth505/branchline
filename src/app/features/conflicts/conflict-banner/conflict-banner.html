<div class="banner">
  <div class="info">
    <ng-icon name="lucideCircleAlert" size="16" />
    <div>
      <strong>{{ store.status()?.conflicted?.length }} conflicted file(s)</strong>
      <div class="files">
        @for (f of store.status()?.conflicted ?? []; track f.path) {
          <span class="mono">{{ f.path }}</span>
        }
      </div>
    </div>
  </div>
  <div class="actions">
    <button
      type="button"
      class="bl-btn"
      (click)="openInEditor()"
      [title]="'Open conflicted files in ' + store.preferredEditorButtonLabel()"
    >
      Open in {{ store.preferredEditorButtonLabel() }}
    </button>
    <button
      type="button"
      class="bl-btn"
      (click)="continueOp()"
      title="Continue merge, rebase, cherry-pick, or revert after resolving"
    >
      Continue
    </button>
    <button
      type="button"
      class="bl-btn"
      (click)="abortOp()"
      title="Abort the in-progress merge, rebase, cherry-pick, or revert"
    >
      Abort
    </button>
    <button
      type="button"
      class="bl-btn bl-btn-primary"
      (click)="openMergeTool()"
      title="Open the configured merge tool"
    >
      Merge tool
    </button>
  </div>
</div>
