<div class="banner" [class.ready]="readyToContinue()">
  <div class="info">
    <ng-icon [name]="readyToContinue() ? 'lucideCheck' : 'lucideCircleAlert'" size="16" />
    <div class="copy">
      <strong>{{ title() }}</strong>
      <p class="hint">{{ hint() }}</p>
      @if (previewFiles().length) {
        <div class="files">
          @for (f of previewFiles(); track f.path) {
            <button
              type="button"
              class="file"
              [class.ready]="f.markersCleared"
              (click)="store.openConflictResolver(f.path)"
              [title]="f.path"
            >
              <span class="mono">{{ fileName(f.path) }}</span>
              @if (f.markersCleared) {
                <span class="kind ready">ready</span>
              } @else if (f.conflictLabel) {
                <span class="kind">{{ f.conflictLabel }}</span>
              }
            </button>
          }
          @if (hiddenFileCount() > 0) {
            <button type="button" class="more-btn" (click)="openResolver()" title="Open resolver">
              +{{ hiddenFileCount() }} more
            </button>
          }
        </div>
      }
    </div>
  </div>
  <div class="actions">
    @if (conflictCount() > 0) {
      <button
        type="button"
        class="bl-btn bl-btn-primary"
        (click)="openResolver()"
        title="Resolve conflicts one file at a time"
      >
        Resolve
      </button>
      <div class="menu-wrap" (click)="$event.stopPropagation()">
        <button
          type="button"
          class="bl-btn"
          (click)="toggleTools()"
          [attr.aria-expanded]="toolsOpen()"
          title="Open conflicts in an editor or merge tool"
        >
          Open in
          <ng-icon name="lucideChevronDown" size="12" />
        </button>
        @if (toolsOpen()) {
          <div class="menu" role="menu">
            <button type="button" role="menuitem" (click)="openInEditor()">
              Preferred ({{ preferredLabel() }})
            </button>
            <button type="button" role="menuitem" (click)="openCursor()">
              Cursor
              @if (!hasCursor()) {
                <span class="opt-hint">try anyway</span>
              }
            </button>
            <button type="button" role="menuitem" (click)="openCursorMerge()">
              Cursor 3-way merge
            </button>
            <button type="button" role="menuitem" (click)="openVscode()">
              VS Code
              @if (!hasVscode()) {
                <span class="opt-hint">try anyway</span>
              }
            </button>
            <button type="button" role="menuitem" (click)="openVscodeMerge()">
              VS Code 3-way merge
            </button>
            <button type="button" role="menuitem" (click)="openMergeTool()">Git mergetool</button>
          </div>
        }
      </div>
    }
    <button
      type="button"
      class="bl-btn"
      [class.bl-btn-primary]="readyToContinue()"
      (click)="continueOp()"
      [title]="
        operation()
          ? 'Continue ' + (operation()?.label ?? 'operation')
          : 'Continue merge, rebase, cherry-pick, or revert after resolving'
      "
    >
      Continue
    </button>
    <button
      type="button"
      class="bl-btn"
      (click)="abortOp()"
      [title]="
        operation()
          ? 'Abort ' + (operation()?.label ?? 'operation')
          : 'Abort the in-progress merge, rebase, cherry-pick, or revert'
      "
    >
      Abort
    </button>
  </div>
</div>
