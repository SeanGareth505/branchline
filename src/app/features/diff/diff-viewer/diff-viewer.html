<div class="diff">
  <header>
    <div class="meta">
      <span class="source-chip" [attr.data-source]="store.diffSource()">{{ sourceLabel() }}</span>
      <div class="files">
        @for (f of files(); track f.path) {
          <button
            type="button"
            class="bl-chip file-chip"
            [class.on]="store.selectedDiffPath() === f.path"
            (click)="selectFile(f.path)"
            [title]="f.path"
          >
            {{ f.path }}
          </button>
        }
      </div>
    </div>
    <button
      type="button"
      class="bl-btn"
      (click)="openDiffTool()"
      title="Open selected file in the configured git difftool"
    >
      Diff tool
    </button>
    <button
      type="button"
      class="bl-btn"
      (click)="toggleSideBySide()"
      [title]="sideBySide() ? 'Switch to unified diff' : 'Switch to side-by-side diff'"
    >
      {{ sideBySide() ? 'Unified' : 'Side by side' }}
    </button>
  </header>

  @if (loading() && !patch()) {
    <p class="empty">Loading diff…</p>
  } @else if (!patch()) {
    <p class="empty">Select a commit, Working directory, or file to view the diff.</p>
  } @else {
    <app-patch-lines-view
      [patch]="patch()"
      [mode]="linesMode()"
      [layout]="sideBySide() ? 'sideBySide' : 'unified'"
      emptyMessage="No changes in this diff."
      (applied)="onApplied()"
    />
  }
</div>
