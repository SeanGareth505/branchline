<div
  class="toast bl-glass-panel"
  [attr.role]="kind === 'error' ? 'alert' : 'status'"
  [attr.data-kind]="kind"
  [attr.aria-live]="kind === 'error' ? 'assertive' : 'polite'"
>
  <span class="icon" aria-hidden="true">
    <ng-icon [name]="iconName()" size="16" />
  </span>
  <span class="message">{{ message }}</span>
  <div class="actions">
    @if (canUndo) {
      <button type="button" class="bl-btn bl-btn-primary" (click)="undo.emit()">Undo</button>
    }
    @if (canUndo || kind === 'error' || kind === 'warning') {
      <button type="button" class="bl-btn" (click)="dismiss.emit()">Dismiss</button>
    } @else {
      <button type="button" class="icon-close" (click)="dismiss.emit()" aria-label="Dismiss" title="Dismiss">
        <ng-icon name="lucideX" size="14" />
      </button>
    }
  </div>
</div>
