<div class="page-skeleton" role="status" aria-label="Loading content" aria-busy="true">
  <div class="body" [class.with-aside]="showAside">
    <div class="cards">
      @for (_ of cardSlots; track $index) {
        <div class="card">
          <div class="card-top">
            <app-skeleton variant="circle" width="2.5rem" height="2.5rem" />
            <div class="card-copy">
              <app-skeleton width="55%" height="0.95rem" />
              <app-skeleton width="80%" height="0.75rem" />
            </div>
          </div>
          <app-skeleton width="100%" height="2.4rem" radius="10px" />
          <div class="card-actions">
            <app-skeleton width="45%" height="1.9rem" radius="8px" />
            <app-skeleton width="35%" height="1.9rem" radius="8px" />
          </div>
        </div>
      }
    </div>

    @if (showAside) {
      <aside class="aside">
        <app-skeleton width="40%" height="1rem" />
        <app-skeleton width="100%" height="0.75rem" />
        <app-skeleton width="100%" height="2.2rem" radius="8px" />
        <app-skeleton width="100%" height="2.2rem" radius="8px" />
        <app-skeleton width="100%" height="2.2rem" radius="8px" />
      </aside>
    }
  </div>
</div>
