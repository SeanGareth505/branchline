<footer class="bar">
  <div class="left">
    @if (store.isDummyBackend) {
      <span class="dummy-pill" title="Browser preview is using fake Git data">DUMMY DATA</span>
    }
    @if (store.status(); as status) {
      <span class="pill">
        <ng-icon name="lucideGitBranch" size="14" />
        {{ status.branch }}
      </span>
      @if (status.ahead > 0) {
        <button
          type="button"
          class="meta action"
          title="Push {{ status.ahead }} commit(s) to remote"
          (click)="onPush()"
        >
          ↑{{ status.ahead }}
        </button>
      }
      @if (status.behind > 0) {
        <button
          type="button"
          class="meta action"
          title="Pull {{ status.behind }} commit(s) from remote"
          (click)="onPull()"
        >
          ↓{{ status.behind }}
        </button>
      }
      @if (store.changeCount() > 0) {
        <button
          type="button"
          class="meta action"
          title="Open commit dialog"
          (click)="onChanges()"
        >
          {{ store.changeCount() }} change{{ store.changeCount() === 1 ? '' : 's' }}
        </button>
      }
    } @else {
      <span class="meta">No repository open</span>
    }
  </div>
  <div class="right">
    <button
      type="button"
      class="bl-btn quiet"
      [class.focus-on]="store.settings().focusMode"
      [attr.aria-pressed]="store.settings().focusMode"
      (click)="store.toggleFocusMode()"
      title="Dim commits unrelated to HEAD in the graph"
    >
      <ng-icon name="lucideFocus" size="14" />
      Focus {{ store.settings().focusMode ? 'on' : 'off' }}
    </button>
    @if (isActionable()) {
      <button
        type="button"
        class="bl-btn bl-btn-primary"
        (click)="store.runNextAction()"
        title="Suggested next step for this repository"
      >
        {{ store.nextAction() }}
      </button>
    } @else {
      <span class="next-quiet" title="Nothing urgent right now">{{ store.nextAction() }}</span>
    }
  </div>
</footer>
