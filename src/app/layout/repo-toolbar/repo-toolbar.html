<div class="strip" role="toolbar" aria-label="Repository actions">
  <div class="group">
    <button
      type="button"
      class="tool"
      title="Reload status, branches, and history from disk"
      [disabled]="store.refreshingRepo()"
      [attr.aria-busy]="store.refreshingRepo()"
      (click)="store.refreshRepo({ notify: true })"
    >
      <ng-icon
        name="lucideRefreshCw"
        size="14"
        [class.spin]="store.refreshingRepo()"
      />
      <span>{{ store.refreshingRepo() ? 'Refreshing…' : 'Refresh' }}</span>
    </button>

    <button
      type="button"
      class="tool primary"
      title="Commit (⌘⇧C / Ctrl+Shift+C)"
      (click)="store.focusCommitPanel()"
    >
      <ng-icon name="lucideGitCommitHorizontal" size="14" />
      <span>Commit</span>
    </button>

    <div class="split" [class.open]="menu() === 'pull'">
      <button
        type="button"
        class="tool"
        [title]="pullTitle()"
        [disabled]="!!store.remoteBusy()"
        [attr.aria-busy]="store.remoteBusy() === 'fetch' || store.remoteBusy() === 'pull'"
        (click)="runDefaultPull()"
      >
        @if (store.remoteBusy() === 'fetch' || store.remoteBusy() === 'pull') {
          <app-spinner size="sm" [label]="store.remoteBusy() === 'fetch' ? 'Fetching' : 'Pulling'" />
        } @else {
          <ng-icon [name]="pullIcon()" size="14" />
        }
        <span>
          @if (store.remoteBusy() === 'fetch') {
            Fetching…
          } @else if (store.remoteBusy() === 'pull') {
            Pulling…
          } @else {
            {{ pullLabel() }}
          }
        </span>
      </button>
      <button
        type="button"
        class="chev"
        title="Pull options"
        aria-label="Pull options"
        aria-haspopup="menu"
        [attr.aria-expanded]="menu() === 'pull'"
        [disabled]="!!store.remoteBusy()"
        cdkOverlayOrigin
        #pullOrigin="cdkOverlayOrigin"
        (click)="toggleMenu('pull', $event)"
      >
        <ng-icon name="lucideChevronDown" size="11" />
      </button>
      <ng-template
        cdkConnectedOverlay
        [cdkConnectedOverlayOrigin]="pullOrigin"
        [cdkConnectedOverlayOpen]="menu() === 'pull'"
        [cdkConnectedOverlayPositions]="menuPositions"
        [cdkConnectedOverlayPush]="true"
        (overlayOutsideClick)="closeMenu()"
      >
        <div class="bl-menu" role="menu">
          <div class="bl-menu-label">Default pull action</div>
          <button
            type="button"
            role="menuitemradio"
            [attr.aria-checked]="store.settings().defaultPullAction === 'merge'"
            title="Pull and merge remote commits into your branch"
            (click)="choosePull('merge')"
          >
            <span class="check">
              @if (store.settings().defaultPullAction === 'merge') {
                <ng-icon name="lucideCheck" size="14" />
              }
            </span>
            Pull and merge
          </button>
          <button
            type="button"
            role="menuitemradio"
            [attr.aria-checked]="store.settings().defaultPullAction === 'rebase'"
            title="Pull and replay your commits on top of remote"
            (click)="choosePull('rebase')"
          >
            <span class="check">
              @if (store.settings().defaultPullAction === 'rebase') {
                <ng-icon name="lucideCheck" size="14" />
              }
            </span>
            Pull and rebase
          </button>
          <button
            type="button"
            role="menuitemradio"
            [attr.aria-checked]="store.settings().defaultPullAction === 'fetch'"
            title="Download remote updates without merging"
            (click)="choosePull('fetch')"
          >
            <span class="check">
              @if (store.settings().defaultPullAction === 'fetch') {
                <ng-icon name="lucideCheck" size="14" />
              }
            </span>
            Fetch
          </button>
        </div>
      </ng-template>
    </div>

    <div class="split" [class.open]="menu() === 'push'">
      <button
        type="button"
        class="tool"
        [class.locked]="store.currentBranchLocked()"
        [disabled]="store.currentBranchLocked() || !!store.remoteBusy()"
        [attr.aria-busy]="store.remoteBusy() === 'push'"
        [title]="
          store.currentBranchLocked()
            ? store.currentBranchLockReason()
              ? 'Branch locked: ' + store.currentBranchLockReason()
              : 'Branch is locked — unlock to push'
            : 'Push commits to the tracked remote'
        "
        (click)="runPush()"
      >
        @if (store.remoteBusy() === 'push') {
          <app-spinner size="sm" label="Pushing" />
        } @else {
          <ng-icon [name]="store.currentBranchLocked() ? 'lucideLock' : 'lucideUpload'" size="14" />
        }
        <span>
          @if (store.remoteBusy() === 'push') {
            Pushing…
          } @else if (store.currentBranchLocked()) {
            Locked
          } @else {
            Push
          }
        </span>
      </button>
      <button
        type="button"
        class="chev"
        title="More push options"
        aria-label="Push options"
        aria-haspopup="menu"
        [attr.aria-expanded]="menu() === 'push'"
        [disabled]="store.currentBranchLocked() || !!store.remoteBusy()"
        cdkOverlayOrigin
        #pushOrigin="cdkOverlayOrigin"
        (click)="toggleMenu('push', $event)"
      >
        <ng-icon name="lucideChevronDown" size="11" />
      </button>
      <ng-template
        cdkConnectedOverlay
        [cdkConnectedOverlayOrigin]="pushOrigin"
        [cdkConnectedOverlayOpen]="menu() === 'push'"
        [cdkConnectedOverlayPositions]="menuPositions"
        [cdkConnectedOverlayPush]="true"
        (overlayOutsideClick)="closeMenu()"
      >
        <div class="bl-menu" role="menu">
          <button type="button" role="menuitem" title="Push commits to the tracked remote" (click)="runPush()">Push</button>
          <button
            type="button"
            role="menuitem"
            title="Overwrite remote history if needed — use carefully"
            (click)="runForcePush()"
          >
            Force push…
          </button>
          <button
            type="button"
            role="menuitem"
            title="Pull latest changes, then push yours"
            (click)="runSync()"
          >
            Sync (pull + push)
          </button>
        </div>
      </ng-template>
    </div>

    <div class="split" [class.open]="menu() === 'stash'">
    <button type="button" class="tool" title="Temporarily shelve uncommitted changes" (click)="runStash()">
      <ng-icon name="lucideLayers" size="14" />
      <span>Stash</span>
    </button>
      <button
        type="button"
        class="chev"
        title="Stash options"
        aria-label="Stash options"
        aria-haspopup="menu"
        [attr.aria-expanded]="menu() === 'stash'"
        cdkOverlayOrigin
        #stashOrigin="cdkOverlayOrigin"
        (click)="toggleMenu('stash', $event)"
      >
        <ng-icon name="lucideChevronDown" size="11" />
      </button>
      <ng-template
        cdkConnectedOverlay
        [cdkConnectedOverlayOrigin]="stashOrigin"
        [cdkConnectedOverlayOpen]="menu() === 'stash'"
        [cdkConnectedOverlayPositions]="menuPositions"
        [cdkConnectedOverlayPush]="true"
        (overlayOutsideClick)="closeMenu()"
      >
        <div class="bl-menu" role="menu">
          <button
            type="button"
            role="menuitem"
            title="Shelve uncommitted changes so you can switch branches cleanly"
            (click)="runStash()"
          >
            Stash changes
          </button>
          <button
            type="button"
            role="menuitem"
            title="Restore the latest stash and remove it from the stash list"
            (click)="runStashPop()"
          >
            Pop latest stash
          </button>
        </div>
      </ng-template>
    </div>

    <button
      type="button"
      class="tool"
      title="Undo the last Branchline action (often undoes the last commit, keeps your files)"
      (click)="store.softUndoLastCommit()"
    >
      <ng-icon name="lucideUndo2" size="14" />
      <span>Undo</span>
    </button>
  </div>

  <div class="group secondary">
    <button
      type="button"
      class="tool icon-only"
      title="Create a pull request on the host in your browser"
      aria-label="Create pull request"
      (click)="createPullRequest()"
    >
      <ng-icon name="lucideGitPullRequest" size="15" />
    </button>
    <button
      type="button"
      class="tool icon-only"
      title="Build a changelog from recent commits"
      aria-label="Extract changelog"
      (click)="store.openChangelogModal()"
    >
      <ng-icon name="lucideScrollText" size="15" />
    </button>
    <button
      type="button"
      class="tool icon-only"
      title="Open the Git command console"
      aria-label="Git console"
      (click)="openConsole()"
    >
      <ng-icon name="lucideTerminal" size="15" />
    </button>
  </div>
</div>
