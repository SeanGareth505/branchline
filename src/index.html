<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <title>Branchline</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="brand/branchline-mark.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="brand/branchline-mark-512.png" />
    <link rel="alternate icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="brand/branchline-mark-512.png" />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('branchline.theme');
          var theme = raw || 'system';
          var resolved =
            theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: light)').matches
                ? 'light'
                : 'dark'
              : theme === 'dark'
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
          var accent = localStorage.getItem('branchline.accent');
          if (accent) document.documentElement.style.setProperty('--accent', accent);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
