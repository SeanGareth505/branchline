name: Release Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NDK_VERSION: '27.0.12077973'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK and build-tools
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}" "platforms;android-36" "build-tools;35.0.0"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Android signing
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          cd src-tauri/gen/android
          if [ -n "${ANDROID_KEY_BASE64:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "Using release keystore from GitHub secrets"
            echo "keyAlias=$ANDROID_KEY_ALIAS" > keystore.properties
            echo "password=$ANDROID_KEY_PASSWORD" >> keystore.properties
            echo "$ANDROID_KEY_BASE64" | base64 -d > "$RUNNER_TEMP/branchline-release.jks"
            echo "storeFile=$RUNNER_TEMP/branchline-release.jks" >> keystore.properties
          else
            echo "No signing secrets set — generating a CI keystore for this build"
            keytool -genkeypair -v \
              -keystore "$RUNNER_TEMP/branchline-ci.jks" \
              -alias branchline \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass branchline -keypass branchline \
              -dname "CN=Branchline, OU=CI, O=Branchline, L=Internet, ST=NA, C=US"
            echo "keyAlias=branchline" > keystore.properties
            echo "password=branchline" >> keystore.properties
            echo "storeFile=$RUNNER_TEMP/branchline-ci.jks" >> keystore.properties
          fi

      - name: Build Android APK
        run: npm run tauri -- android build --apk --target aarch64
        env:
          NDK_HOME: ${{ env.NDK_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}

      - name: Collect APK
        id: apk
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK=$(find src-tauri/gen/android -name '*.apk' -type f | head -n 1)
          if [ -z "$APK" ]; then
            echo "No APK found under src-tauri/gen/android"
            find src-tauri/gen/android -type f \( -name '*.apk' -o -name '*.aab' \) | head -50 || true
            exit 1
          fi
          OUT="Branchline-${VERSION}-android.apk"
          cp "$APK" "$OUT"
          cp "$APK" Branchline-android.apk
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "stable=Branchline-android.apk" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT" Branchline-android.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Branchline-${{ steps.version.outputs.version }}-android
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.stable }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.stable }}
          generate_release_notes: true
          body: |
            ## Install Branchline on Android

            1. Download **Branchline-android.apk** (or the versioned APK) from Assets below
            2. Open the file on your phone and allow install from this source if asked

            Download page: https://seangareth505.github.io/branchline/

            Direct download:
            https://github.com/${{ github.repository }}/releases/latest/download/Branchline-android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
