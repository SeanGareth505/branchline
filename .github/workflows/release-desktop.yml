name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple Developer certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Only export Apple signing vars when import succeeds.
          # Empty APPLE_CERTIFICATE in the environment still makes Tauri try to
          # codesign and fail — so we must not set those env vars at all when skipping.
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "No APPLE_CERTIFICATE secret; building unsigned macOS artifacts"
            exit 0
          fi
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-branchline-ci-$(date +%s)}"
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          if ! security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain; then
            echo "Failed to create keychain; building unsigned macOS artifacts"
            exit 0
          fi
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          if ! security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign; then
            echo "Certificate import failed; building unsigned macOS artifacts"
            exit 0
          fi
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security find-identity -v -p codesigning build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/{print $2; exit}')
          if [ -z "$CERT_ID" ]; then
            CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Apple Development|Apple Distribution/{print $2; exit}')
          fi
          if [ -z "$CERT_ID" ]; then
            echo "No signing identity found; building unsigned macOS artifacts"
            exit 0
          fi
          {
            echo "APPLE_SIGNING_IDENTITY=$CERT_ID"
            echo "APPLE_CERTIFICATE<<EOF"
            echo "$APPLE_CERTIFICATE"
            echo "EOF"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            if [ -n "${APPLE_ID:-}" ]; then echo "APPLE_ID=$APPLE_ID"; fi
            if [ -n "${APPLE_PASSWORD:-}" ]; then echo "APPLE_PASSWORD=$APPLE_PASSWORD"; fi
            if [ -n "${APPLE_TEAM_ID:-}" ]; then echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"; fi
          } >> "$GITHUB_ENV"
          echo "Imported signing identity: $CERT_ID"

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseName: Branchline ${{ github.ref_type == 'tag' && github.ref_name || 'v__VERSION__' }}
          releaseBody: |
            ## Download
            Easy download page: https://seangareth505.github.io/branchline/

            ### macOS
            1. Open the `.dmg` and drag Branchline to Applications
            2. If macOS says the app is damaged, download **Fix & Open** from the download page, or run:
               `xattr -cr /Applications/Branchline.app && open /Applications/Branchline.app`

            ### Windows
            Run the setup `.exe`. If SmartScreen appears: More info → Run anyway.

            ### Android
            Install `Branchline-android.apk` (enable install from this source if asked).
          releaseDraft: ${{ github.ref_type != 'tag' }}
          prerelease: false
          args: ${{ matrix.args }}

  stabilize-names:
    needs: publish-tauri
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Publish stable download filenames
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          mkdir -p /tmp/rel
          gh release download "$TAG" -R "${{ github.repository }}" -D /tmp/rel

          copy_stable() {
            local pattern="$1"
            local stable="$2"
            local src
            src=$(find /tmp/rel -maxdepth 1 -type f -iname "$pattern" | head -n 1 || true)
            if [ -n "$src" ]; then
              cp "$src" "/tmp/rel/$stable"
              echo "Stable: $stable <- $(basename "$src")"
            else
              echo "Skip missing pattern: $pattern"
            fi
          }

          copy_stable '*aarch64*.dmg' 'Branchline-mac-arm64.dmg'
          copy_stable '*x64*.dmg' 'Branchline-mac-x64.dmg'
          copy_stable '*-setup.exe' 'Branchline-windows-setup.exe'
          copy_stable '*.AppImage' 'Branchline-linux.AppImage'
          copy_stable '*.deb' 'Branchline-linux.deb'
          copy_stable '*-android.apk' 'Branchline-android.apk'

          shopt -s nullglob
          FILES=(
            /tmp/rel/Branchline-mac-arm64.dmg
            /tmp/rel/Branchline-mac-x64.dmg
            /tmp/rel/Branchline-windows-setup.exe
            /tmp/rel/Branchline-linux.AppImage
            /tmp/rel/Branchline-linux.deb
            /tmp/rel/Branchline-android.apk
          )
          EXISTING=()
          for f in "${FILES[@]}"; do
            [ -f "$f" ] && EXISTING+=("$f")
          done
          if [ "${#EXISTING[@]}" -gt 0 ]; then
            gh release upload "$TAG" "${EXISTING[@]}" -R "${{ github.repository }}" --clobber
          fi
